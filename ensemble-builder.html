<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NSJW Ensemble Builder</title>
<style>
  :root{
    --coral:#ff5a4d; --coral-dk:#e0392c; --ink:#1c1c22; --muted:#6b6b78;
    --line:#e6e6ec; --bg:#f4f4f7; --card:#ffffff; --good:#1f9d63; --good-bg:#e7f6ee;
    --warn:#d98300; --warn-bg:#fff6e6; --bad:#d94436;
    --drums:#7e57c2; --bass:#5c6bc0; --guitar:#26a69a; --piano:#42a5f5; --horn:#ef6c00; --voice:#ec407a; --other:#90a4ae;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  header{background:linear-gradient(100deg,#15141a 0%,#1f2330 55%,#2a2740 100%);color:#fff;padding:11px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;flex-wrap:wrap;border-bottom:2px solid var(--coral)}
  header .brand{font-family:Georgia,'Iowan Old Style','Times New Roman',serif;font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;color:#f4f1ea;white-space:nowrap}
  header .brand .star{color:var(--coral)}
  header .toolname{font-size:11px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:#9fa3b2;border-left:1px solid #4a4a57;padding-left:11px}
  header .sub{color:#aeb0be;font-size:12px}
  header .spacer{flex:1}
  .btn{border:none;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer;background:#33333d;color:#fff}
  .btn:hover{background:#44444f}
  .btn.primary{background:var(--coral)} .btn.primary:hover{background:var(--coral-dk)}
  .btn.ghost{background:transparent;border:1px solid #4a4a55}
  .wrap{display:grid;grid-template-columns:320px 1fr;gap:16px;padding:16px;align-items:start}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .left{position:sticky;top:60px}
  .controls{padding:10px;display:flex;gap:8px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .controls input,.controls select{padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit}
  .controls input{flex:1;min-width:110px}
  .zone{padding:8px 10px}
  .zone>.zh{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;padding:6px 4px}
  .dropzone{border:1.5px dashed transparent;border-radius:10px;min-height:40px;transition:.1s;padding:2px}
  .dropzone.over{border-color:var(--coral);background:#fff4f3}
  .leadsZone{max-height:38vh;overflow-y:auto}
  .benchZone{max-height:30vh;overflow-y:auto;border-top:1px solid var(--line)}
  .emptxt{color:#b0b0bc;font-size:12px;font-style:italic;padding:8px 6px}
  .person{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--line);border-radius:9px;margin:5px 2px;background:#fff;cursor:grab}
  .person:hover{border-color:#c9c9d2;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .person.dragging{opacity:.5}
  .ico{border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
  .person .ico{width:26px;height:26px;font-size:10px}
  .person .nm{flex:1;min-width:0}
  .person .nm b{display:block;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .person .nm small{color:var(--muted);font-size:11px}
  .tag{font-size:9.5px;font-weight:800;padding:2px 6px;border-radius:5px;white-space:nowrap}
  .tag.q{background:#eaf7d8;color:#5c8a1d}
  .tag.s{background:#e3effd;color:#2f6fb0}
  .tag.nq{background:#fdeede;color:#b5651b}
  .tag.origin{background:#f0eafb;color:#6a3fb0}
  .tag.lead{background:#fdeede;color:#b5651b}
  .tag.leaving{background:#fde5e2;color:#c0392b}
  .chip.leaving-chip{border-color:#f3b6ae;background:#fff7f6}
  .belt{width:9px;height:9px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex:none}
  .ensembles{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .ens{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .ens.modified{border-color:var(--coral);box-shadow:0 0 0 1px var(--coral) inset}
  .ens.over{border-color:var(--coral);background:#fff8f7}
  .ens .eh{padding:9px 11px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;background:#fbfbfd}
  .ens .eh input{border:none;background:transparent;font-size:14.5px;font-weight:700;font-family:inherit;flex:1;min-width:0;padding:2px 3px;border-radius:6px}
  .ens .eh input:focus{outline:none;background:#fff;box-shadow:0 0 0 2px var(--coral)}
  .ens .eh .cnt{font-size:11px;color:var(--muted);font-weight:700}
  .ens .eh .moddot{color:var(--coral);font-size:16px;line-height:0}
  .ens .eh .x{cursor:pointer;color:#c2c2cc;font-size:16px;font-weight:700;padding:0 3px}
  .ens .eh .x:hover{color:var(--coral)}
  .instbar{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px 4px}
  .pill{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;display:flex;align-items:center;gap:4px;color:#fff}
  .pill.short{opacity:.55} .pill.over{outline:2px solid var(--warn);outline-offset:-2px}
  .roles{padding:6px 10px 10px;display:flex;flex-direction:column;gap:2px;min-height:40px}
  .role-row{display:flex;flex-direction:column;gap:3px;padding:4px 0}
  .role-lbl{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .chip{display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:grab;margin-left:2px}
  .chip:hover{border-color:#c9c9d2}
  .chip.dragging{opacity:.5}
  .chip .ico{width:22px;height:22px;font-size:9px}
  .chip .nm{flex:1;min-width:0}
  .chip .nm b{display:block;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .nm small{color:var(--muted);font-size:10.5px}
  .chip .rm{cursor:pointer;color:#c4c4cc;font-weight:700;font-size:14px;padding:0 2px}
  .chip .rm:hover{color:var(--coral)}
  .ens .empty{color:#b0b0bc;font-size:12px;font-style:italic;padding:6px}
  .chip .beltname{color:#8a8a96;font-weight:600}
  .ens-notes{padding:0 10px 11px}
  .ens-notes .nlbl{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:2px 2px 4px}
  .ens-notes textarea{width:100%;min-height:38px;resize:vertical;border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-family:inherit;font-size:12px;line-height:1.4;color:var(--ink);background:#fbfbff}
  .ens-notes textarea:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 2px rgba(255,90,77,.15);background:#fff}
  .ens-notes textarea::placeholder{color:#b7b7c2}
  /* move button + tap-to-assign menu */
  .mv{cursor:pointer;color:#b6b6c2;font-size:14px;font-weight:700;padding:0 5px;user-select:none}
  .mv:hover{color:var(--coral)}
  .assign-overlay{position:fixed;inset:0;background:rgba(20,20,26,.5);display:none;z-index:200;align-items:center;justify-content:center}
  .assign-overlay.show{display:flex}
  .assign-sheet{background:#fff;border-radius:14px;width:min(420px,92vw);max-height:82vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.32)}
  .assign-head{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .assign-head b{font-size:15px}
  .assign-x{cursor:pointer;color:#b6b6c2;font-size:22px;font-weight:700;line-height:1;padding:0 4px}
  .assign-list{overflow-y:auto;padding:8px}
  .assign-sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:8px 6px 2px}
  .assign-item{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:9px;padding:12px;margin:5px 0;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--ink)}
  .assign-item:hover{border-color:var(--coral);background:#fff6f5}
  .assign-item.current{color:var(--muted);background:#f3f3f6}
  .left-toggle{display:none}
  @media (max-width:820px){
    .wrap{grid-template-columns:1fr;padding:10px;gap:10px}
    .left{position:static}
    .left-toggle{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;font-weight:800;font-size:13px;cursor:pointer;background:#fbfbfd;border-bottom:1px solid var(--line)}
    .left.collapsed .controls,.left.collapsed .zone{display:none}
    .ensembles{grid-template-columns:1fr}
    header{padding:9px 12px;gap:8px}
    header .brand{font-size:16px}
    header .toolname{display:none}
    .btn{padding:7px 10px;font-size:12px}
    .person{padding:11px 10px}
    .chip{padding:10px 9px}
    .mv,.chip .rm,.slot .rm{font-size:20px;padding:4px 8px}
    .leadsZone{max-height:34vh}.benchZone{max-height:24vh}
  }
  .addens{border:2px dashed #d0d0da;border-radius:12px;display:flex;align-items:center;justify-content:center;min-height:120px;color:var(--muted);font-weight:700;cursor:pointer}
  .addens:hover{border-color:var(--coral);color:var(--coral)}
  .legend{font-size:11px;color:var(--muted);padding:6px 16px 20px}
  .legend span{display:inline-flex;align-items:center;gap:4px;margin-right:12px}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .syncpill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#33333d;color:#cfcfd6;white-space:nowrap}
  .syncpill.live{background:#12341f;color:#54e08a}
  .syncpill.connecting{background:#3a3320;color:#e8c766}
  .syncpill.localmode{background:#333;color:#b9b9c4}
  .syncpill.err{background:#3a2020;color:#ff8a80}
  @media print{
    header .btn,.left,.addens,.chip .rm,.ens .eh .x{display:none!important}
    .wrap{grid-template-columns:1fr}
    body{background:#fff}
    .ens{break-inside:avoid}
  }
</style>
</head>
<body>
<header>
  <h1 class="brand">North <span class="star">Star</span> Jazz Workshops</h1>
  <span class="toolname">Ensemble Builder</span>
  <span class="sub" id="stamp"></span>
  <span class="syncpill localmode" id="sync">○ Local</span>
  <span class="spacer"></span>
  <button class="btn ghost" onclick="addEnsemble()">+ New Ensemble</button>
  <button class="btn ghost" onclick="copyLineups()">Copy Lineups</button>
  <button class="btn ghost" onclick="copyChanges()">Copy Changes</button>
  <button class="btn ghost" onclick="window.print()">Print / PDF</button>
  <button class="btn primary" onclick="resetAll()">Reset</button>
</header>

<div class="wrap">
  <!-- LEFT -->
  <div class="panel left">
    <div class="left-toggle" onclick="toggleLeft()"><span>Leads &amp; Bench</span><span id="leftChevron">▾</span></div>
    <div class="controls">
      <input id="search" placeholder="Search name…" oninput="render()">
      <select id="instFilter" onchange="render()">
        <option value="">All instruments</option>
        <option value="drums">Drums</option><option value="bass">Bass</option>
        <option value="guitar">Guitar</option><option value="piano">Piano/Keys</option>
        <option value="horn">Horns</option><option value="voice">Voice</option><option value="other">Other</option>
      </select>
    </div>
    <div class="zone">
      <div class="zh"><span>Leads · Qualified + Sit-In stages</span><span id="leadsCount"></span></div>
      <div class="dropzone leadsZone" id="leadsZone" data-loc="leads"></div>
    </div>
    <div class="zone">
      <div class="zh"><span>Bench · pulled from bands</span><span id="benchCount"></span></div>
      <div class="dropzone benchZone" id="benchZone" data-loc="bench"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div>
    <div class="ensembles" id="ensembles"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<!-- tap-to-assign menu (mobile-friendly; desktop drag still works) -->
<div class="assign-overlay" id="assignOverlay" onclick="closeAssign()">
  <div class="assign-sheet" onclick="event.stopPropagation()">
    <div class="assign-head"><b id="assignName"></b><span class="assign-x" onclick="closeAssign()">&times;</span></div>
    <div class="assign-list" id="assignList"></div>
  </div>
</div>

/* ---- instrument categorization ---- */
const CATLABEL={drums:'Drums',bass:'Bass',guitar:'Guitar',piano:'Piano',horn:'Horns',voice:'Voice',other:'Other'};
const CATCOLOR={drums:'var(--drums)',bass:'var(--bass)',guitar:'var(--guitar)',piano:'var(--piano)',horn:'var(--horn)',voice:'var(--voice)',other:'var(--other)'};
const CATORDER=['drums','bass','guitar','piano','horn','voice','other'];
const IDEAL={drums:1,bass:1,guitar:1,piano:1,horn:3};
function catsOf(instr){const s=(instr||'').toLowerCase();const o=[];
  if(/drum|percuss/.test(s))o.push('drums');
  if(/bass|tuba/.test(s))o.push('bass');
  if(/guitar|banjo|mandolin/.test(s))o.push('guitar');
  if(/piano|key|vibr/.test(s))o.push('piano');
  if(/sax|trumpet|trombone|tenor|alto|bari|soprano|flute|clarinet|horn|euphon|brass/.test(s))o.push('horn');
  if(/voice|vocal|sing/.test(s))o.push('voice');
  if(!o.length)o.push('other');return o;}
function primaryCat(i){return catsOf(i)[0];}
const BELTHEX={white:'#f4f4f4',blue:'#4a90d9',purple:'#8e5cd9',brown:'#8a5a2b',black:'#222'};
function beltColor(b){const k=(b||'').toLowerCase().split(',')[0].trim();return BELTHEX[k]||'transparent';}
function initials(n){return n.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return '';const d=s.split(' ')[0].split('-');return d.length<3?s:(+d[1])+'/'+(+d[2])+'/'+d[0].slice(2);}
// a member is "leaving" (needs a swap) if they have a Date Left that hasn't been reversed by a later Date Returned
function leaveInfo(p){
  if(p.type!=='member'||!p.left)return null;
  if(p.returned && p.returned>=p.left)return null; // came back
  return {date:fmtDate(p.left)};
}

/* ---- registry (rebuilt whenever RAW changes) ---- */
let PEOPLE={};
function buildPeople(){
  PEOPLE={};
  RAW.leads.forEach(l=>PEOPLE['L'+l.id]={uid:'L'+l.id,type:'lead',name:l.name,instrument:l.instrument,belt:l.belt,status:l.status,section:l.section});
  RAW.members.forEach(m=>PEOPLE['M'+m.id]={uid:'M'+m.id,type:'member',name:m.name,instrument:m.instrument,belt:m.belt,origBand:m.band,left:m.left||'',returned:m.returned||''});
}

/* ---- default state ---- */
function bandNum(b){const n=parseInt((b||'').replace(/\D/g,''));return isNaN(n)?999:n;}
function buildDefault(){
  const bands=[...new Set(RAW.members.map(m=>m.band))].sort((a,b)=>bandNum(a)-bandNum(b));
  const ens=bands.map(b=>({id:'band-'+bandNum(b),name:b,isNew:false}));
  const place={};
  RAW.members.forEach(m=>place['M'+m.id]='band-'+bandNum(m.band));
  RAW.leads.forEach(l=>place['L'+l.id]='leads');
  return {ens,place};
}
let ORIGINAL, ORIG_MEMBERS_BY_BAND;
// (re)compute registry + change-tracking baseline from the current RAW
function rebuildData(){
  buildPeople();
  ORIGINAL=buildDefault();
  ORIG_MEMBERS_BY_BAND={};
  Object.entries(ORIGINAL.place).forEach(([uid,loc])=>{(ORIG_MEMBERS_BY_BAND[loc]=ORIG_MEMBERS_BY_BAND[loc]||new Set()).add(uid);});
  const st=document.getElementById('stamp'); if(st) st.textContent='Roster from Monday · '+RAW.stamp;
}
// make sure the Firebase SDK is actually available — retry the load a few times
// (mobile/flaky connections sometimes drop the first script request, which would
//  otherwise leave that person stuck in "Local only")
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.async=false;s.src=src;s.onload=()=>res();s.onerror=()=>rej();document.head.appendChild(s);});}
async function ensureFirebase(){
  for(let i=0;i<4 && !(window.firebase&&window.firebase.database);i++){
    try{
      await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');
      await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js');
    }catch(e){}
    if(!(window.firebase&&window.firebase.database))await new Promise(r=>setTimeout(r,700));
  }
  return !!(window.firebase&&window.firebase.database);
}
// fetch the live roster (hosted), fall back to the baked snapshot, then start syncing state
async function boot(){
  try{
    const r=await fetch('roster.json',{cache:'no-store'});
    if(r.ok){const j=await r.json(); if(j&&Array.isArray(j.members)&&Array.isArray(j.leads)&&j.members.length) RAW=j;}
  }catch(e){}
  rebuildData();
  await ensureFirebase();
  initSync();
}

const STORE_KEY='nsjw_ens3';
let ensembles, place;
// default placement for everyone, then overlay saved placements for people who still exist,
// and repair any placement pointing at an ensemble that no longer exists
function reconcile(savedPlace){
  const d=buildDefault();
  const p={...d.place};
  Object.keys(savedPlace||{}).forEach(u=>{if(PEOPLE[u])p[u]=savedPlace[u];});
  const ids=new Set((ensembles&&ensembles.length?ensembles:d.ens).map(e=>e.id));
  Object.keys(p).forEach(u=>{const loc=p[u];
    if(loc!=='leads'&&loc!=='bench'&&!ids.has(loc))p[u]=PEOPLE[u].type==='lead'?'leads':'bench';});
  return p;
}

/* ---------- real-time sync (Firebase) with local-only fallback ---------- */
let dbRef=null, applyingRemote=false, writeTimer=null;
function setSync(state){
  const el=document.getElementById('sync');if(!el)return;
  const m={live:['live','● Live · shared'],connecting:['connecting','◌ Connecting…'],
           local:['localmode','○ Local only'],error:['err','● Offline']}[state]||['localmode','○ Local'];
  el.className='syncpill '+m[0];el.textContent=m[1];
}
function initSync(){
  const cfg=(typeof FIREBASE_CONFIG!=='undefined')?FIREBASE_CONFIG:null;
  if(!cfg||!cfg.apiKey||cfg.apiKey.indexOf('PASTE')===0||typeof firebase==='undefined'){
    setSync('local');loadLocal();render();return;
  }
  try{
    firebase.initializeApp(cfg);
    dbRef=firebase.database().ref('ensembleBuilder');
    setSync('connecting');
    dbRef.on('value',snap=>{
      const remote=snap.val();
      applyingRemote=true;
      if(remote&&remote.ens&&remote.place){ensembles=remote.ens;place=reconcile(remote.place);}
      else{const d=buildDefault();ensembles=d.ens;place=d.place;dbRef.set({ens:ensembles,place:place});}
      render();
      applyingRemote=false;
      setSync('live');
    },err=>{setSync('error');loadLocal();render();});
  }catch(e){setSync('local');loadLocal();render();}
}
function loadLocal(){
  const d=buildDefault();ensembles=d.ens;place={...d.place};
  try{const s=JSON.parse(localStorage.getItem(STORE_KEY));
    if(s&&s.ens&&s.place){ensembles=s.ens;place=reconcile(s.place);}}catch(e){}
}
// called after any change; writes to the shared DB (debounced) or localStorage
function save(){
  if(applyingRemote)return;
  if(dbRef){clearTimeout(writeTimer);writeTimer=setTimeout(()=>dbRef.set({ens:ensembles,place:place}),250);}
  else{try{localStorage.setItem(STORE_KEY,JSON.stringify({ens:ensembles,place:place}));}catch(e){}}
}
function ensName(id){const e=ensembles.find(x=>x.id===id);return e?e.name:id;}
function peopleAt(loc){return Object.keys(place).filter(u=>place[u]===loc).map(u=>PEOPLE[u]).filter(Boolean);}

/* ---- move ---- */
function moveTo(uid,loc){
  if(loc==='leads'&&PEOPLE[uid].type!=='lead')loc='bench'; // members can't sit in leads pool
  place[uid]=loc;render();
}

/* ---- pool cards ---- */
function personCard(p){
  const cat=primaryCat(p.instrument);const lv=leaveInfo(p);
  const d=document.createElement('div');d.className='person'+(lv?' leaving-chip':'');d.draggable=true;d.dataset.uid=p.uid;
  let right='';
  if(p.type==='lead'){const sm={'Sit-In':['s','Sit-In'],'Qualified':['q','Qualified'],'New-Qualified':['nq','New Qual']}[p.section]||['q',p.status];right='<span class="tag '+sm[0]+'">'+sm[1]+'</span>';}
  else right='<span class="tag origin">'+esc(p.origBand)+'</span>';
  if(lv)right+='<span class="tag leaving" title="Leaving — plan a swap">⤴ '+lv.date+'</span>';
  const sub=esc(p.instrument||'—')+((p.type==='member'&&p.belt)?' · '+esc(p.belt):'');
  d.innerHTML='<span class="belt" title="'+esc(p.belt)+' belt" style="background:'+beltColor(p.belt)+'"></span>'+
    '<span class="ico" style="background:'+CATCOLOR[cat]+'">'+initials(p.name)+'</span>'+
    '<span class="nm"><b>'+esc(p.name)+'</b><small>'+sub+'</small></span>'+right+
    '<span class="mv" title="Move…" onclick="event.stopPropagation();openAssign(\''+p.uid+'\')">⇄</span>';
  wireDrag(d,p.uid); wireTap(d,p.uid);
  return d;
}
function wireDrag(el,uid){
  el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/uid',uid);e.dataTransfer.effectAllowed='move';el.classList.add('dragging');});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
}
function wireDrop(el,loc){
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('over');});
  el.addEventListener('dragleave',()=>el.classList.remove('over'));
  el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('over');const u=e.dataTransfer.getData('text/uid');if(u)moveTo(u,loc);});
}
// on touch devices, tapping a card opens the move menu (desktop keeps drag)
const IS_TOUCH=(window.matchMedia&&window.matchMedia('(pointer: coarse)').matches)||('ontouchstart' in window)||(navigator.maxTouchPoints>0);
function wireTap(el,uid){
  el.addEventListener('click',e=>{
    if(!IS_TOUCH)return;
    if(e.target.closest('.rm')||e.target.closest('.mv'))return;
    openAssign(uid);
  });
}
/* ---- tap-to-assign menu ---- */
function openAssign(uid){
  const p=PEOPLE[uid];if(!p)return;
  const cur=place[uid];
  document.getElementById('assignName').textContent='Move '+p.name+' →';
  const list=document.getElementById('assignList');list.innerHTML='';
  const add=(id,label)=>{const b=document.createElement('button');
    b.className='assign-item'+(id===cur?' current':'');
    b.textContent=label+(id===cur?'  · here now':'');
    b.onclick=()=>{closeAssign();if(id!==cur)moveTo(uid,id);};
    list.appendChild(b);};
  const sec=t=>{const d=document.createElement('div');d.className='assign-sec';d.textContent=t;list.appendChild(d);};
  sec('Ensembles');
  ensembles.forEach(e=>add(e.id,e.name));
  sec('Holding');
  if(p.type==='lead')add('leads','Leads pool');
  add('bench','Bench');
  // guard against the trailing "ghost tap" on mobile closing/mis-hitting the menu right after it opens
  const ov=document.getElementById('assignOverlay');
  ov.style.pointerEvents='none';
  ov.classList.add('show');
  setTimeout(()=>{ov.style.pointerEvents='';},400);
}
function closeAssign(){document.getElementById('assignOverlay').classList.remove('show');}
function toggleLeft(){
  const l=document.querySelector('.left');l.classList.toggle('collapsed');
  document.getElementById('leftChevron').textContent=l.classList.contains('collapsed')?'▸':'▾';
}

/* ---- render ---- */
function passFilter(p){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const inst=document.getElementById('instFilter').value;
  return (!q||p.name.toLowerCase().includes(q))&&(!inst||catsOf(p.instrument).includes(inst));
}
function render(){
  // preserve the notes box someone is typing in, so live updates don't interrupt them
  let noteFocus=null;
  const ae=document.activeElement;
  if(ae&&ae.dataset&&ae.dataset.notesEns){
    noteFocus={id:ae.dataset.notesEns,val:ae.value,s:ae.selectionStart,e:ae.selectionEnd};
    const en=ensembles.find(x=>x.id===noteFocus.id);if(en)en.notes=ae.value; // keep in-progress text
  }
  // left pools
  const lz=document.getElementById('leadsZone');lz.innerHTML='';
  const bz=document.getElementById('benchZone');bz.innerHTML='';
  const leadsPool=peopleAt('leads').filter(passFilter);
  const bench=peopleAt('bench').filter(passFilter);
  document.getElementById('leadsCount').textContent=peopleAt('leads').length;
  document.getElementById('benchCount').textContent=peopleAt('bench').length;
  if(!leadsPool.length)lz.innerHTML='<div class="emptxt">No leads here.</div>';
  leadsPool.forEach(p=>lz.appendChild(personCard(p)));
  if(!bench.length)bz.innerHTML='<div class="emptxt">Empty — drag anyone here to park them.</div>';
  bench.forEach(p=>bz.appendChild(personCard(p)));

  // ensembles
  const wrap=document.getElementById('ensembles');wrap.innerHTML='';
  ensembles.forEach(ens=>wrap.appendChild(ensCard(ens)));
  const add=document.createElement('div');add.className='addens';add.textContent='+ Add ensemble';add.onclick=addEnsemble;
  wrap.appendChild(add);

  // restore notes-box focus + caret after rebuild
  if(noteFocus){
    const t=document.querySelector('[data-notes-ens="'+noteFocus.id+'"]');
    if(t){t.focus();try{t.setSelectionRange(noteFocus.s,noteFocus.e);}catch(e){}}
  }
  buildLegend();save();
}

function ensCard(ens){
  const members=Object.keys(place).filter(u=>place[u]===ens.id).map(u=>PEOPLE[u]).filter(Boolean);
  const byCat={};CATORDER.forEach(c=>byCat[c]=[]);
  members.forEach(p=>byCat[primaryCat(p.instrument)].push(p));

  const card=document.createElement('div');card.className='ens';
  // modified?
  const orig=ORIG_MEMBERS_BY_BAND[ens.id]||new Set();
  const cur=new Set(members.map(p=>p.uid));
  const modified=!ens.isNew && (orig.size!==cur.size || [...cur].some(u=>!orig.has(u)) || [...orig].some(u=>!cur.has(u)));
  const isNewMod=ens.isNew && members.length>0;
  if(modified||isNewMod)card.classList.add('modified');

  const head=document.createElement('div');head.className='eh';
  head.innerHTML=(modified||isNewMod?'<span class="moddot" title="Changed from original">●</span>':'')+
    '<input value="'+esc(ens.name)+'" onchange="renameEns(\''+ens.id+'\',this.value)">'+
    '<span class="cnt">'+members.length+'</span>'+
    '<span class="x" title="Remove ensemble" onclick="removeEns(\''+ens.id+'\')">&times;</span>';
  card.appendChild(head);

  // instrumentation pills
  const bar=document.createElement('div');bar.className='instbar';
  Object.keys(IDEAL).forEach(c=>{
    const have=byCat[c].length,need=IDEAL[c];
    let cls='pill';if(have<need)cls+=' short';if(have>need)cls+=' over';
    bar.innerHTML+='<span class="'+cls+'" style="background:'+CATCOLOR[c]+'">'+CATLABEL[c]+' '+have+'/'+need+'</span>';
  });
  card.appendChild(bar);

  // role rows
  const rr=document.createElement('div');rr.className='roles';
  if(!members.length)rr.innerHTML='<div class="empty">Empty — drag players here.</div>';
  CATORDER.forEach(c=>{
    if(!byCat[c].length)return;
    const row=document.createElement('div');row.className='role-row';
    row.innerHTML='<div class="role-lbl" style="color:'+CATCOLOR[c]+'">'+CATLABEL[c]+'</div>';
    byCat[c].forEach(p=>row.appendChild(chip(p,ens)));
    rr.appendChild(row);
  });
  card.appendChild(rr);

  // shared notes for discussing this group
  const notes=document.createElement('div');notes.className='ens-notes';
  notes.innerHTML='<div class="nlbl">Notes</div>'+
    '<textarea data-notes-ens="'+ens.id+'" placeholder="Notes for this group — questions, ideas, who to swap in…" '+
    'oninput="setNotes(\''+ens.id+'\',this.value)">'+esc(ens.notes||'')+'</textarea>';
  card.appendChild(notes);

  wireDrop(card,ens.id);
  return card;
}
// update a group's shared note (syncs to everyone; no re-render so typing stays smooth)
function setNotes(id,v){const e=ensembles.find(x=>x.id===id);if(e){e.notes=v;save();}}

function chip(p,ens){
  const cat=primaryCat(p.instrument);const lv=leaveInfo(p);
  const c=document.createElement('div');c.className='chip'+(lv?' leaving-chip':'');c.draggable=true;c.dataset.uid=p.uid;
  let badge='';
  if(p.type==='lead')badge='<span class="tag lead">lead</span>';
  if(p.type==='member' && p.origBand!==ens.name)badge='<span class="tag origin">'+esc(p.origBand)+'</span>';
  if(lv)badge+='<span class="tag leaving" title="Leaving — plan a swap">⤴ '+lv.date+'</span>';
  const belt=p.belt||'';
  const sub=esc(p.instrument||'—')+(belt?' · <span class="beltname">'+esc(belt)+'</span>':'');
  c.innerHTML=(belt?'<span class="belt" title="'+esc(belt)+' belt" style="background:'+beltColor(belt)+'"></span>':'')+
    '<span class="ico" style="background:'+CATCOLOR[cat]+'">'+initials(p.name)+'</span>'+
    '<span class="nm"><b>'+esc(p.name)+'</b><small>'+sub+'</small></span>'+
    badge+'<span class="mv" title="Move…" onclick="event.stopPropagation();openAssign(\''+p.uid+'\')">⇄</span>'+
    '<span class="rm" title="Send to bench" onclick="event.stopPropagation();moveTo(\''+p.uid+'\',\'bench\')">&times;</span>';
  wireDrag(c,p.uid); wireTap(c,p.uid);
  return c;
}

/* ---- ensemble ops ---- */
function renameEns(id,v){const e=ensembles.find(x=>x.id===id);if(e){e.name=v||'Ensemble';save();render();}}
function addEnsemble(){ensembles.push({id:'new-'+Math.random().toString(36).slice(2,7),name:'New Ensemble',isNew:true});render();}
function removeEns(id){
  const e=ensembles.find(x=>x.id===id);const n=Object.keys(place).filter(u=>place[u]===id).length;
  if(!confirm('Remove "'+e.name+'"?'+(n?' Its '+n+' player(s) go to the Bench.':'')))return;
  Object.keys(place).forEach(u=>{if(place[u]===id)place[u]='bench';});
  ensembles=ensembles.filter(x=>x.id!==id);render();
}
function resetAll(){if(confirm('Reset everything back to the current Monday rosters?')){const d=buildDefault();ensembles=d.ens;place=d.place;render();}}

/* ---- wire left drop zones ---- */
wireDrop(document.getElementById('leadsZone'),'leads');
wireDrop(document.getElementById('benchZone'),'bench');

/* ---- legend ---- */
function buildLegend(){
  document.getElementById('legend').innerHTML='Roles: '+
    Object.keys(CATLABEL).map(c=>'<span><i style="background:'+CATCOLOR[c]+'"></i>'+CATLABEL[c]+'</span>').join('')+
    ' &nbsp;·&nbsp; target per band = 1 drums · 1 bass · 1 guitar · 1 piano · 3 horns. '+
    'Faded pill = short, amber outline = over. Purple tag = player’s original band. ● = band changed from Monday. '+
    '<span style="color:#c0392b;font-weight:700">⤴ red = has a leave date (plan a swap)</span>.';
}

/* ---- exports ---- */
function copyLineups(){
  let t='NORTH STAR — ENSEMBLE LINEUPS ('+RAW.stamp+')\n\n';
  ensembles.forEach(e=>{
    const mem=Object.keys(place).filter(u=>place[u]===e.id).map(u=>PEOPLE[u]).filter(Boolean)
      .sort((a,b)=>CATORDER.indexOf(primaryCat(a.instrument))-CATORDER.indexOf(primaryCat(b.instrument)));
    t+='■ '+e.name+' ('+mem.length+')\n';
    if(!mem.length)t+='   (empty)\n';
    mem.forEach(p=>{t+='   • '+p.name+' — '+(p.instrument||'')+(p.belt?', '+p.belt:'')+(p.type==='lead'?' [LEAD]':(p.origBand!==e.name?' [from '+p.origBand+']':''))+'\n';});
    if(e.notes&&e.notes.trim())t+='   Notes: '+e.notes.trim().replace(/\n/g,'\n          ')+'\n';
    t+='\n';
  });
  copyText(t,'Lineups copied.');
}
function copyChanges(){
  const moves=[];
  Object.keys(place).forEach(u=>{
    const p=PEOPLE[u];const now=place[u];
    if(p.type==='member'){
      const home='band-'+bandNum(p.origBand);
      if(now!==home){
        const to = now==='bench'?'Bench':(now==='leads'?'Leads':ensName(now));
        moves.push(p.origBand+'  →  '+to+'   ('+p.name+', '+(p.instrument||'')+')');
      }
    }else{ // lead
      if(now!=='leads'){
        const to = now==='bench'?'Bench':ensName(now);
        moves.push('LEAD  →  '+to+'   ('+p.name+', '+(p.instrument||'')+')');
      }
    }
  });
  let t='NORTH STAR — PROPOSED CHANGES ('+RAW.stamp+')\n\n';
  t+= moves.length? moves.sort().join('\n') : 'No changes yet — rosters match Monday.';
  copyText(t,moves.length+' change(s) copied.');
}
function copyText(t,msg){
  navigator.clipboard.writeText(t).then(()=>alert(msg)).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert(msg);
  });
}

boot();
</script>
