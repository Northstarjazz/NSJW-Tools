<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSJW Teacher Matching</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 16px; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.top-title { font-size: 15px; font-weight: 500; }
.top-sub { font-size: 12px; color: #888; margin-top: 2px; }
.refresh-btn { font-size: 11px; color: #555; background: none; border: 0.5px solid #ccc; border-radius: 12px; padding: 4px 12px; cursor: pointer; }
.refresh-btn:hover { background: #eee; }
.filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; transition: all .15s; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.legend { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
.legend-swatch.open { background: #f0fdf4; border: 1px solid #86efac; }
.legend-swatch.filled { background: #f5f5f3; border: 1px solid #e5e5e3; }
.legend-swatch.stretch { background: #fffef5; border: 1px dashed #d4c87a; }
.teacher-card { background: #fff; border: 0.5px solid #e5e5e3; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.teacher-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 0.5px solid #f0f0ee; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; background: #f0f0ee; color: #444; }
.teacher-info { flex: 1; }
.teacher-name { font-size: 14px; font-weight: 500; }
.teacher-meta { font-size: 11px; color: #888; margin-top: 2px; }
.capacity-pills { display: flex; gap: 3px; }
.cap-pip { width: 8px; height: 8px; border-radius: 50%; }
.cap-pip.filled { background: #1a1a1a; }
.cap-pip.open { background: #d1fae5; border: 1px solid #6ee7b7; }
.cap-pip.stretch { background: #fff; border: 1px dashed #aaa; }
.windows-section { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.window-block { }
.window-title { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.weeks-tag { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #f0f0ee; color: #666; font-weight: 400; text-transform: none; letter-spacing: 0; }
.slots-row { display: flex; flex-wrap: wrap; gap: 6px; }
.slot { font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 0.5px solid; }
.slot.open { background: #f0fdf4; border-color: #86efac; color: #166534; }
.slot.filled { background: #f5f5f3; border-color: #e5e5e3; color: #bbb; }
.slot.stretch { background: #fffef5; border-color: #d4c87a; color: #7a6a00; border-style: dashed; }
.slot-name { font-size: 10px; display: block; margin-top: 2px; }
.slot.filled .slot-name { color: #bbb; }
.slot.open .slot-name { color: #166534; }
.slot.stretch .slot-name { color: #7a6a00; }
.loading { text-align: center; padding: 2rem; color: #aaa; font-size: 13px; }
.error-box { background: #fcebeb; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #a32d2d; margin-bottom: 12px; }
.no-results { text-align: center; padding: 2rem; color: #aaa; font-size: 13px; }
.update-note { font-size: 11px; color: #aaa; margin-bottom: 14px; }
.update-note a { color: #888; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="top-title">Teacher Matching</div>
    <div class="top-sub" id="last-updated">Loading...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch open"></div>Open</div>
  <div class="legend-item"><div class="legend-swatch filled"></div>Filled</div>
  <div class="legend-item"><div class="legend-swatch stretch"></div>Stretch (confirm with teacher)</div>
</div>

<p class="update-note">To update slots, edit the <a href="https://docs.google.com/spreadsheets/d/1o36Nyvb3EGnAeRH0dtvClP1C4Autz0axBUCJ94zKYuQ/edit#gid=1048672252" target="_blank">Teacher Slots sheet</a> — changes appear here automatically.</p>

<div class="filter-row" id="filters"></div>
<div id="teachers-container"><div class="loading">Loading teacher availability...</div></div>

<script>
const CSV_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://docs.google.com/spreadsheets/d/e/2PACX-1vQbfie-mofJw0XS5aPxcZRH_YEOAjFxHuKotzquxtY0_F9akhMWiMFZvTYsvnvT82JnCvrQtbYfcpGh/pub?gid=1048672252&single=true&output=csv");

const TEACHER_COLORS = {
  "Pete James Johnson":  "background:#E6F1FB;color:#0C447C;",
  "Joe Hartnett":        "background:#E1F5EE;color:#085041;",
  "Chris Bates":         "background:#FAEEDA;color:#633806;",
  "Ian Duerr":           "background:#FBEAF0;color:#72243E;",
  "Anya Menk":           "background:#EEEDFE;color:#3C3489;",
  "Chris Olson":         "background:#EAF3DE;color:#27500A;",
};

const TEACHER_INSTRUMENTS = {
  "Pete James Johnson": "Drums",
  "Joe Hartnett":       "Bass",
  "Chris Bates":        "Bass",
  "Ian Duerr":          "Piano, Guitar",
  "Anya Menk":          "Voice, Piano, Flute",
  "Chris Olson":        "Guitar",
};

const ALL_INSTRUMENTS = ["All", "Drums", "Bass", "Piano", "Guitar", "Voice", "Flute", "Horn"];
let activeFilter = "All";
let teacherData = {};

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/"/g, "").toLowerCase());
  return lines.slice(1).map(line => {
    const vals = line.split(",").map(v => v.trim().replace(/"/g, ""));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || "");
    return obj;
  }).filter(r => r.teacher);
}

function buildTeacherData(rows) {
  const teachers = {};
  rows.forEach(row => {
    const name = row.teacher;
    if (!teachers[name]) {
      teachers[name] = { name, windows: {} };
    }
    const windowKey = row.day + "|" + row.weeks + "|" + row.location;
    if (!teachers[name].windows[windowKey]) {
      teachers[name].windows[windowKey] = {
        day: row.day,
        weeks: row.weeks,
        location: row.location,
        slots: []
      };
    }
    teachers[name].windows[windowKey].slots.push({
      time: row.starttime,
      status: row.status,
      student: row.student || null
    });
  });
  return teachers;
}

function initials(name) {
  return name.split(" ").filter(Boolean).map(p => p[0]).join("").slice(0, 2).toUpperCase();
}

function matchesFilter(name) {
  if (activeFilter === "All") return true;
  const inst = TEACHER_INSTRUMENTS[name] || "";
  return inst.toLowerCase().includes(activeFilter.toLowerCase());
}

function renderSlot(slot) {
  const studentHTML = slot.student
    ? `<span class="slot-name">${slot.student}</span>`
    : slot.status === "stretch"
    ? `<span class="slot-name">confirm w/ teacher</span>`
    : "";
  return `<div class="slot ${slot.status}">${slot.time}${studentHTML}</div>`;
}

function renderWindow(win) {
  const tags = [
    win.weeks ? `<span class="weeks-tag">${win.weeks}</span>` : "",
    win.location ? `<span class="weeks-tag">${win.location}</span>` : ""
  ].join("");
  return `<div class="window-block">
    <div class="window-title">${win.day} ${tags}</div>
    <div class="slots-row">${win.slots.map(renderSlot).join("")}</div>
  </div>`;
}

function renderTeacher(name, data) {
  const color = TEACHER_COLORS[name] || "background:#f0f0ee;color:#444;";
  const instruments = TEACHER_INSTRUMENTS[name] || "";
  const allSlots = Object.values(data.windows).flatMap(w => w.slots);
  const filled = allSlots.filter(s => s.status === "filled").length;
  const open = allSlots.filter(s => s.status === "open").length;
  const stretch = allSlots.filter(s => s.status === "stretch").length;
  const pips = [
    ...Array(filled).fill('<div class="cap-pip filled"></div>'),
    ...Array(open).fill('<div class="cap-pip open"></div>'),
    ...Array(stretch).fill('<div class="cap-pip stretch"></div>'),
  ].join("");
  const windows = Object.values(data.windows).map(renderWindow).join("");
  return `<div class="teacher-card">
    <div class="teacher-header">
      <div class="avatar" style="${color}">${initials(name)}</div>
      <div class="teacher-info">
        <div class="teacher-name">${name}</div>
        <div class="teacher-meta">${instruments}</div>
      </div>
      <div style="text-align:right">
        <div class="capacity-pills">${pips}</div>
        <div style="font-size:10px;color:#aaa;margin-top:3px">${open} open · ${filled} filled</div>
      </div>
    </div>
    <div class="windows-section">${windows}</div>
  </div>`;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === f));
  render();
}

function render() {
  const names = Object.keys(teacherData).filter(matchesFilter);
  if (!names.length) {
    document.getElementById("teachers-container").innerHTML = `<div class="no-results">No teachers found for ${activeFilter}.</div>`;
    return;
  }
  document.getElementById("teachers-container").innerHTML = names.map(n => renderTeacher(n, teacherData[n])).join("");
}

function buildFilters() {
  document.getElementById("filters").innerHTML = ALL_INSTRUMENTS.map(inst =>
    `<button class="filter-btn ${inst === "All" ? "active" : ""}" data-filter="${inst}" onclick="setFilter('${inst}')">${inst}</button>`
  ).join("");
}

async function loadData() {
  document.getElementById("last-updated").textContent = "Loading...";
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("fetch failed");
    const text = await res.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error("empty");
    teacherData = buildTeacherData(rows);
    document.getElementById("last-updated").textContent = "Updated " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    render();
  } catch(e) {
    document.getElementById("last-updated").textContent = "Could not load data";
    document.getElementById("teachers-container").innerHTML = `<div class="error-box">Failed to load teacher slots. Check that the Google Sheet is published as CSV.</div>`;
  }
}

buildFilters();
loadData();
</script>
</body>
</html>
