<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSJW Teacher Matching</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 16px; }
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.top-title { font-size: 15px; font-weight: 500; }
.top-sub { font-size: 12px; color: #888; margin-top: 2px; }
.refresh-btn { font-size: 11px; color: #555; background: none; border: 0.5px solid #ccc; border-radius: 12px; padding: 4px 12px; cursor: pointer; }
.refresh-btn:hover { background: #eee; }
.filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; transition: all .15s; }
.filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
.legend { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
.legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
.legend-swatch.open { background: #f0fdf4; border: 1px solid #86efac; }
.legend-swatch.filled { background: #f5f5f3; border: 1px solid #e5e5e3; }
.legend-swatch.stretch { background: #fff; border: 1px dashed #aaa; }
.teacher-card { background: #fff; border: 0.5px solid #e5e5e3; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.teacher-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 0.5px solid #f0f0ee; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.teacher-info { flex: 1; }
.teacher-name { font-size: 14px; font-weight: 500; }
.teacher-meta { font-size: 11px; color: #888; margin-top: 2px; }
.capacity-pills { display: flex; gap: 3px; }
.cap-pip { width: 8px; height: 8px; border-radius: 50%; }
.cap-pip.filled { background: #1a1a1a; }
.cap-pip.open { background: #d1fae5; border: 1px solid #6ee7b7; }
.cap-pip.stretch { background: #fff; border: 1px dashed #aaa; }
.windows-section { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.window-block { }
.window-title { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.weeks-tag { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #f0f0ee; color: #666; font-weight: 400; text-transform: none; letter-spacing: 0; }
.slots-row { display: flex; flex-wrap: wrap; gap: 6px; }
.slot { font-size: 12px; padding: 5px 10px; border-radius: 8px; border: 0.5px solid; cursor: default; }
.slot.open { background: #f0fdf4; border-color: #86efac; color: #166534; }
.slot.filled { background: #f5f5f3; border-color: #e5e5e3; color: #bbb; }
.slot.stretch { background: #fffef5; border-color: #d4c87a; color: #7a6a00; border-style: dashed; }
.slot-name { font-size: 10px; display: block; margin-top: 2px; color: #aaa; }
.flexible-note { font-size: 12px; color: #888; font-style: italic; padding: 4px 0; }
.no-results { text-align: center; padding: 2rem; color: #aaa; font-size: 13px; }
.loading { text-align: center; padding: 2rem; color: #aaa; font-size: 13px; }
.error-box { background: #fcebeb; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #a32d2d; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="top-title">Teacher Matching</div>
    <div class="top-sub" id="last-updated">Loading...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch open"></div>Open</div>
  <div class="legend-item"><div class="legend-swatch filled"></div>Filled</div>
  <div class="legend-item"><div class="legend-swatch stretch"></div>Stretch (confirm with teacher)</div>
</div>

<div class="filter-row" id="filters"></div>
<div id="teachers-container"><div class="loading">Loading teachers...</div></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzI3Wp79JSX_FZKlS-d1oRvBr-uJ87VIEv5u_xYQ8TJrLyE06mRVx0Mc1rs1jxT7cFYtg/exec";

// Static schedule — windows and slots are defined here.
// To update availability, edit the Teaching Availability column in the Faculty board on Monday.
// Current students per slot are hardcoded here — update when roster changes.
const SCHEDULE = [
  {
    name: "Pete James Johnson",
    initials: "PJ",
    color: "background:#E6F1FB;color:#0C447C;",
    instruments: "Drums",
    windows: [
      {
        label: "Monday evenings", weeks: "every week", location: "JCS Green Room",
        slots: [
          { time: "5:00pm", status: "filled", student: "Jason Digman (Wks 1&3) / Adrian Houston (Wks 2&4)" },
          { time: "6:05pm", status: "filled", student: "Josh Dietsche (1st wk)" },
          { time: "7:10pm", status: "filled", student: "Michael Leville (weekly)" },
          { time: "8:15pm", status: "stretch", student: null },
        ]
      }
    ]
  },
  {
    name: "Joe Hartnett",
    initials: "JH",
    color: "background:#E1F5EE;color:#085041;",
    instruments: "Bass",
    windows: [
      {
        label: "Tuesday evenings", weeks: "Wks 2&4", location: "JCS Green Room",
        slots: [
          { time: "4:00pm", status: "filled", student: "Joe Cudzilo" },
          { time: "5:05pm", status: "filled", student: "James Moore" },
          { time: "6:10pm", status: "filled", student: "Neil Garcia" },
          { time: "7:15pm", status: "stretch", student: null },
        ]
      },
      {
        label: "Wednesday evenings", weeks: "Wks 2&4", location: "JCS Green Room",
        slots: [
          { time: "7:30pm", status: "filled", student: "Thoger Boyum" },
          { time: "8:35pm", status: "filled", student: "Ron Siven (2nd wk)" },
          { time: "9:40pm", status: "stretch", student: null },
        ]
      },
      {
        label: "Friday afternoons", weeks: "every week", location: "JCS",
        slots: [
          { time: "2:00pm", status: "open", student: null },
          { time: "3:05pm", status: "open", student: null },
          { time: "1:00pm", status: "stretch", student: null },
        ]
      }
    ]
  },
  {
    name: "Chris Bates",
    initials: "CB",
    color: "background:#FAEEDA;color:#633806;",
    instruments: "Bass",
    windows: [
      {
        label: "Tuesday afternoons", weeks: "Wks 2&4", location: "JCS Main Room",
        slots: [
          { time: "4:00pm", status: "filled", student: "Mohammad Mokhtarabadi" },
          { time: "5:05pm", status: "filled", student: "Aaron Stoehr" },
          { time: "6:10pm", status: "open", student: null },
          { time: "7:15pm", status: "stretch", student: null },
        ]
      }
    ]
  },
  {
    name: "Ian Duerr",
    initials: "ID",
    color: "background:#FBEAF0;color:#72243E;",
    instruments: "Piano, Guitar",
    windows: [
      {
        label: "Saturday mornings", weeks: "every week", location: "Home studio",
        slots: [
          { time: "9:00am", status: "filled", student: "Pat Besanson (weekly)" },
          { time: "10:05am", status: "filled", student: "Keith Heinen (Wks 2&4)" },
          { time: "11:10am", status: "open", student: null },
          { time: "12:15pm", status: "open", student: null },
          { time: "8:00am", status: "stretch", student: null },
        ]
      }
    ]
  },
  {
    name: "Anya Menk",
    initials: "AM",
    color: "background:#EEEDFE;color:#3C3489;",
    instruments: "Voice, Piano, Flute",
    windows: [
      {
        label: "Friday mornings", weeks: "every week", location: "JCS Green Room",
        slots: [
          { time: "10:00am", status: "open", student: null },
          { time: "11:30am", status: "filled", student: "Erin Anderson (45min, Wks 1&3)" },
          { time: "12:15pm", status: "open", student: null },
          { time: "9:00am", status: "stretch", student: null },
        ]
      }
    ]
  },
  {
    name: "Chris Olson",
    initials: "CO",
    color: "background:#EAF3DE;color:#27500A;",
    instruments: "Guitar",
    windows: [
      {
        label: "Highly flexible", weeks: "", location: "JCS",
        slots: [
          { time: "Tue 3:05pm", status: "filled", student: "Peter Ashley (flexible)" },
          { time: "Contact to arrange", status: "open", student: null },
        ]
      }
    ]
  }
];

const INSTRUMENTS = ["All", "Drums", "Bass", "Piano", "Guitar", "Voice", "Flute", "Horn"];
let activeFilter = "All";

function initials(name) {
  return name.split(" ").map(p => p[0]).join("").slice(0,2).toUpperCase();
}

function matchesFilter(teacher) {
  if (activeFilter === "All") return true;
  return teacher.instruments.toLowerCase().includes(activeFilter.toLowerCase());
}

function capacitySummary(teacher) {
  let filled = 0, open = 0, stretch = 0;
  teacher.windows.forEach(w => {
    w.slots.forEach(s => {
      if (s.status === "filled") filled++;
      else if (s.status === "open") open++;
      else if (s.status === "stretch") stretch++;
    });
  });
  return { filled, open, stretch };
}

function renderSlot(slot) {
  const studentLabel = slot.student ? `<span class="slot-name">${slot.student}</span>` : "";
  const stretchNote = slot.status === "stretch" ? `<span class="slot-name">confirm w/ teacher</span>` : "";
  return `<div class="slot ${slot.status}">${slot.time}${studentLabel}${stretchNote}</div>`;
}

function renderWindow(win) {
  const weeksTag = win.weeks ? `<span class="weeks-tag">${win.weeks}</span>` : "";
  const locationTag = win.location ? `<span class="weeks-tag">${win.location}</span>` : "";
  return `<div class="window-block">
    <div class="window-title">${win.label} ${weeksTag} ${locationTag}</div>
    <div class="slots-row">${win.slots.map(renderSlot).join("")}</div>
  </div>`;
}

function renderTeacher(t) {
  const cap = capacitySummary(t);
  const pips = [
    ...Array(cap.filled).fill('<div class="cap-pip filled"></div>'),
    ...Array(cap.open).fill('<div class="cap-pip open"></div>'),
    ...Array(cap.stretch).fill('<div class="cap-pip stretch"></div>'),
  ].join("");

  return `<div class="teacher-card">
    <div class="teacher-header">
      <div class="avatar" style="${t.color}">${t.initials}</div>
      <div class="teacher-info">
        <div class="teacher-name">${t.name}</div>
        <div class="teacher-meta">${t.instruments}</div>
      </div>
      <div>
        <div class="capacity-pills">${pips}</div>
        <div style="font-size:10px;color:#aaa;margin-top:3px;text-align:right">${cap.open} open · ${cap.filled} filled</div>
      </div>
    </div>
    <div class="windows-section">${t.windows.map(renderWindow).join("")}</div>
  </div>`;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === f));
  render();
}

function render() {
  const filtered = SCHEDULE.filter(matchesFilter);
  if (!filtered.length) {
    document.getElementById("teachers-container").innerHTML = `<div class="no-results">No teachers found for ${activeFilter}.</div>`;
    return;
  }
  document.getElementById("teachers-container").innerHTML = filtered.map(renderTeacher).join("");
}

function buildFilters() {
  document.getElementById("filters").innerHTML = INSTRUMENTS.map(inst =>
    `<button class="filter-btn ${inst === "All" ? "active" : ""}" data-filter="${inst}" onclick="setFilter('${inst}')">${inst}</button>`
  ).join("");
}

async function loadData() {
  document.getElementById("last-updated").textContent = "Refreshing from Monday...";
  try {
    const res = await fetch(API_URL + "?action=teachers");
    if (!res.ok) throw new Error("failed");
    const teachers = await res.json();
    if (teachers && teachers.length) {
      document.getElementById("last-updated").textContent = "Live from Monday · Updated " + new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
    } else {
      throw new Error("empty");
    }
  } catch(e) {
    document.getElementById("last-updated").textContent = "Could not reach Monday — showing cached schedule";
  }
  render();
}

buildFilters();
loadData();
</script>
</body>
</html>
